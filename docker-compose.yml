##############################################################################
#  Prompt Injection Lab — docker-compose.yml
#
#  Architecture:
#    Browser -> :8080 (Flask)  ->  :11434 (Ollama / local LLM)
#
#  Usage:
#    docker compose up --build    # first run (downloads model once)
#    docker compose down          # stop — model stays in ./ollama-models/
#    docker compose up -d         # restart — model already on disk, instant
#
#  The model is stored in ./ollama-models/ next to this file.
#  Never use 'down -v' unless you want to delete the downloaded model.
#
#  Customisation:
#    MODEL_NAME   : change to 'phi3', 'mistral', 'llama3.2:1b', etc.
#    SECRET_FLAG  : override the hidden flag
##############################################################################

services:

  # ── 1. Ollama (local LLM engine) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: injection-lab-ollama
    restart: unless-stopped
    volumes:
      # Bind-mount to local folder so model survives container deletion.
      # The folder is created automatically on first run.
      - ./ollama-models:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── 2. Model loader (one-shot: pulls model then exits) ────────────────────
  model-loader:
    image: ollama/ollama:latest
    container_name: injection-lab-model-loader
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./ollama-models:/root/.ollama
    environment:
      - MODEL_NAME=${MODEL_NAME:-tinyllama}
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["sh", "-c", "echo \"Checking/pulling $MODEL_NAME...\" && ollama pull $MODEL_NAME && echo 'Model ready.'"]
    restart: "no"

  # ── 3. Flask backend + web UI ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: injection-lab-backend
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
    ports:
      - "8080:5000"
    volumes:
      - ./frontend:/app/frontend:ro
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MODEL_NAME=${MODEL_NAME:-tinyllama}
      - SECRET_FLAG=${SECRET_FLAG:-FLAG{pr0mpt_1nj3ct10n_m4st3r_2024}}
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

# No named volumes section — we use bind mounts now.
