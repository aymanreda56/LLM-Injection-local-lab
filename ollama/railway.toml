# railway.toml — Ollama service

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Ollama needs time to initialise its HTTP server before the health check fires.
# healthcheckTimeout is how long Railway waits total for the service to become healthy.
healthcheckPath = "/api/tags"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
