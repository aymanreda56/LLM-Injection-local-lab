# railway.toml — Ollama service
# No healthcheck — Ollama binds on its own internal port (11434) and is
# accessed by the Flask backend over Railway's private network.
# The Flask entrypoint.sh handles waiting for Ollama to be ready.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
